<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        body{
            background-color: darkgrey;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .conteiner{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(188, 229, 245);
            box-shadow: 0px 0px 10px rgba(151, 151, 151, 0.3);;
            height: 200px;
            width: 200px;
            border-radius: 20px;
        }
        
    </style>

</head>
<body>
    <div class="conteiner">
       <form action="/cadastro" method="POST">

        <p>Usuário</p>
        <input id="usuario" name="usuario" type="text">

        <p>Senha</p>
        <input id="senha" name="senha" type="password">

        <br>
        <button class="botao" type="submit">CADASTRA</button>
    </form> 
    </div>
    

    
</body>
</html>
